<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevBoard</title>
    <!--
      EXPLANATION: This is the ONLY HTML file in your entire React app.
      React is a "Single Page Application" (SPA) — it loads this one page
      and then swaps content in and out using JavaScript without full page reloads.

      The <div id="root"> below is where React mounts. Everything React renders
      gets injected into that div.

      The <script> tag at the bottom loads your React app (main.jsx).
      Vite handles the bundling and hot-reload automatically.
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
